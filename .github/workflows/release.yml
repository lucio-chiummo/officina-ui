name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

# Publishing uses npm Trusted Publishing (OIDC), so no NPM_TOKEN secret is
# needed. One-time setup: publish the first @officina/ui version manually
# from your machine, then add this repo + workflow as a Trusted Publisher on
# the package's npm settings page. Also enable Settings -> Actions ->
# General -> "Allow GitHub Actions to create and approve pull requests".
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version:packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
